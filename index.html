<html>
    <head>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="main-container">
            <div class="panel1">
                <div class="logo-box">
                    <img class="logo" alt="logo-img" src="/images/Logo.png">
                </div>
                <div class="generator-box">
                    <h1 class="generate-txt">GENERATE SECURE PASSWORD</h1>
                    <div class="password-box">
                        <div class="password"></div>
                        <div class="line"></div>
                        <div class="change-box">
                            <h3 class="change-icon">↻</h3>
                            <h3 class="change-txt">CHANGE</h3>
                        </div>
                    </div>
                    <div class="edit-box1">
                        <div class="length-box1">
                            <h4 class="password-length">Password Length: <span class="slider-value">10</span></h4>
                            <input type="range" class="slider" min="0" max="44" value="10">
                        </div>
                        <div class="copy-box">
                            
                        </div>
                    </div>
                    <div class="edit-box2"></div>
                    <div class="strength-box"></div>
                </div>
            </div>
            <div class="panel2">
                <div class="history-box">
                    <h2 class="history-txt">Recent History</h2>
                    <div class="histories-box"></div>
                </div>
                <div class="saved-box">
                    <h2 class="saved-txt">Saved passwords</h2>
                    <div class="saves-box"></div>
                </div>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
